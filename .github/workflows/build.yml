name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: pressEnterLater-windows.exe
            build_name: pressEnterLater.exe
          - os: ubuntu-latest
            artifact_name: pressEnterLater-linux
            build_name: pressEnterLater
          - os: macos-latest
            artifact_name: pressEnterLater-macos
            build_name: pressEnterLater
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          uv sync
          uv pip install pyinstaller
      
      - name: Build with PyInstaller (Windows)
        if: matrix.os == 'windows-latest'
        run: uv run pyinstaller main.py --onefile --windowed --name pressEnterLater
      
      - name: Build with PyInstaller (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: uv run pyinstaller main.py --onefile --name pressEnterLater
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.build_name }}
  
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/pressEnterLater-windows.exe/pressEnterLater.exe
            artifacts/pressEnterLater-linux/pressEnterLater
            artifacts/pressEnterLater-macos/pressEnterLater
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
